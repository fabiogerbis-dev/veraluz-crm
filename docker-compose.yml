services:
  mariadb:
    image: mariadb:11.4
    container_name: veraluz-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: veraluz_crm
      MARIADB_USER: veraluz
      MARIADB_PASSWORD: veraluz123
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./server/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: veraluz-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: veraluz-super-secret
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: veraluz_crm
      DB_USER: veraluz
      DB_PASSWORD: veraluz123
    ports:
      - "4000:4000"
    volumes:
      - server_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veraluz-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

  adminer:
    image: adminer:4.8.1
    container_name: veraluz-adminer
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mariadb_data:
  server_uploads:

upstream veraluz_crm_frontend {
  server veraluz-crm-frontend:80;
}

server {
  listen 80;
  server_name crm.veraluz.net.br;

  client_max_body_size 20m;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
    try_files $uri =404;
  }

  location / {
    return 308 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name crm.veraluz.net.br;

  client_max_body_size 20m;

  ssl_certificate /etc/letsencrypt/live/crm.veraluz.net.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/crm.veraluz.net.br/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /api/realtime/ {
    proxy_pass http://veraluz_crm_frontend/api/realtime/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    chunked_transfer_encoding off;
  }

  location / {
    proxy_pass http://veraluz_crm_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
  }
}

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Veraluz CRM</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Manrope", sans-serif;
        background: linear-gradient(135deg, #f4f7fa 0%, #e8f0f0 100%);
        color: #123235;
      }

      .card {
        width: min(440px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(18, 50, 53, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #486164;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sem conexão no momento</h1>
      <p>O Veraluz CRM continua instalado. Assim que a internet voltar, atualize a tela para retomar o trabalho.</p>
    </main>
  </body>
</html>
